services:
  roomdesigner:
    build: .
    container_name: roomdesigner
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - MESHY_API_KEY=${MESHY_API_KEY}
      - MOGE2_MODAL_ENDPOINT=${MOGE2_MODAL_ENDPOINT}
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_PUBLIC_URL=${R2_PUBLIC_URL}
    volumes:
      - roomdesigner_data:/app/server/data
    restart: unless-stopped
    networks:
      - proxy-network

volumes:
  roomdesigner_data:

networks:
  proxy-network:
    external: true
