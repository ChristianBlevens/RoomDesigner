<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Furniture Segmenter</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="stylesheet" href="styles/segmentation.css">
</head>
<body>
  <div id="seg-app">

    <!-- Upload state -->
    <div id="seg-upload" class="seg-upload">
      <div class="seg-upload-zone" id="seg-drop-zone">
        <p class="seg-upload-title">Furniture Segmenter</p>
        <p class="seg-upload-subtitle">Upload a photo with multiple furniture items</p>
        <label class="btn-primary seg-upload-btn">
          Choose Photo
          <input type="file" id="seg-file-input" accept="image/*" hidden>
        </label>
        <p class="seg-upload-hint">or drag and drop</p>
      </div>
    </div>

    <!-- Working state -->
    <div id="seg-workspace" class="seg-workspace hidden">
      <div class="seg-toolbar">
        <button id="seg-btn-upload-new" class="btn-secondary" title="Upload new photo">New Photo</button>
        <div class="seg-toolbar-info">
          <span id="seg-point-count">Add an object to start</span>
        </div>
        <button id="seg-btn-undo-point" class="btn-secondary" title="Remove last point from selected object">Undo Point</button>
        <button id="seg-btn-segment" class="btn-primary" title="Run segmentation" disabled>Segment</button>
        <button id="seg-btn-reset" class="btn-secondary hidden" title="Clear results and start over">Reset</button>
        <div id="seg-edit-controls" class="seg-edit-controls hidden">
          <button id="seg-btn-undo-edit" class="btn-secondary seg-edit-btn" title="Undo last stroke" disabled>Undo</button>
          <button id="seg-btn-paint" class="btn-secondary seg-edit-btn" title="Paint to add to mask">Paint</button>
          <button id="seg-btn-erase" class="btn-secondary seg-edit-btn" title="Erase to remove from mask">Erase</button>
          <input id="seg-brush-size" type="range" min="5" max="100" value="20" class="seg-brush-slider" title="Brush size">
        </div>
      </div>

      <div class="seg-main">
        <!-- Left: source image with point markers and mask overlays -->
        <div class="seg-canvas-container">
          <canvas id="seg-canvas"></canvas>
          <div id="seg-processing" class="seg-processing hidden">
            <p>Segmenting...</p>
          </div>
        </div>

        <!-- Right: object list (during point placement) -->
        <div id="seg-object-panel" class="seg-side-panel">
          <div class="seg-panel-header">
            <h3>Objects (<span id="seg-object-count">0</span>)</h3>
            <button id="seg-btn-add-object" class="btn-primary seg-btn-add" title="Add new object">+</button>
          </div>
          <div id="seg-object-list" class="seg-panel-list"></div>
        </div>

        <!-- Right: segment results (after segmentation) -->
        <div id="seg-results" class="seg-side-panel hidden">
          <div class="seg-panel-header">
            <h3>Objects (<span id="seg-result-count">0</span>)</h3>
            <button id="seg-btn-export" class="btn-primary">Export All</button>
          </div>
          <div id="seg-result-list" class="seg-panel-list"></div>
        </div>
      </div>
    </div>

    <!-- Fix modal: select segments for AI repair before export -->
    <div id="seg-fix-modal" class="seg-modal-overlay hidden">
      <div class="seg-fix-modal">
        <div class="seg-fix-header">
          <h3>Export Segments</h3>
          <p class="seg-fix-subtitle">Select objects that need AI repair (cut off by overlapping items)</p>
        </div>
        <div id="seg-fix-grid" class="seg-fix-grid"></div>
        <div class="seg-fix-footer">
          <div id="seg-fix-status" class="seg-fix-status"></div>
          <div class="seg-fix-actions">
            <button id="seg-fix-cancel" class="btn-secondary">Cancel</button>
            <button id="seg-fix-export" class="btn-primary">Export</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Feedback button (fixed bottom-right) -->
    <button id="seg-feedback-btn" class="seg-feedback-btn" title="Send Feedback">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
      </svg>
    </button>

    <!-- Feedback modal (self-contained for segmentation page) -->
    <div id="seg-feedback-modal" class="seg-modal-overlay hidden">
      <div class="seg-fix-modal" style="max-width:480px;">
        <div class="seg-fix-header">
          <h3>Send Feedback</h3>
        </div>
        <form id="seg-feedback-form" style="padding:16px;">
          <textarea id="seg-feedback-message" rows="4" placeholder="Tell us what's on your mind..." required
            style="width:100%;resize:vertical;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:var(--text-primary);padding:12px;font-family:inherit;"></textarea>
          <div class="seg-fix-footer" style="padding:12px 0 0;">
            <div></div>
            <div class="seg-fix-actions">
              <button type="button" id="seg-feedback-cancel" class="btn-secondary">Cancel</button>
              <button type="submit" id="seg-feedback-submit" class="btn-primary">Send</button>
            </div>
          </div>
        </form>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script type="module" src="scripts/segmentation.js"></script>
</body>
</html>
